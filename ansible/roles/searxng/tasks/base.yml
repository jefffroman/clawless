---
# Base tasks: SearXNG infrastructure baked into golden image.
# Called via: tasks_from: base

- name: Create searxng system user
  ansible.builtin.user:
    name: "{{ searxng_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /opt/searxng
    create_home: false

- name: Ensure SearXNG directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ searxng_user }}"
    group: "{{ searxng_user }}"
    mode: "0755"
  loop:
    - /opt/searxng
    - "{{ searxng_config_dir }}"

- name: Mark SearXNG source dir as safe for git
  ansible.builtin.command:
    cmd: git config --system --add safe.directory {{ searxng_src }}
  changed_when: false

- name: Clone SearXNG source
  ansible.builtin.git:
    repo: https://github.com/searxng/searxng.git
    dest: "{{ searxng_src }}"
    depth: 1
    version: master
    force: false

- name: Create SearXNG Python venv
  ansible.builtin.command:
    cmd: python3 -m venv {{ searxng_venv }}
    creates: "{{ searxng_venv }}/bin/activate"

- name: Install SearXNG requirements into venv
  ansible.builtin.pip:
    requirements: "{{ searxng_src }}/requirements.txt"
    virtualenv: "{{ searxng_venv }}"

- name: Fix ownership
  ansible.builtin.file:
    path: /opt/searxng
    state: directory
    owner: "{{ searxng_user }}"
    group: "{{ searxng_user }}"
    recurse: true

- name: Deploy SearXNG systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/searxng.service
    content: |
      [Unit]
      Description=SearXNG metasearch engine
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=exec
      User={{ searxng_user }}
      Group={{ searxng_user }}
      WorkingDirectory={{ searxng_src }}
      Environment=SEARXNG_SETTINGS_PATH={{ searxng_config_dir }}/settings.yml
      Environment=PYTHONPATH={{ searxng_src }}
      ExecStart={{ searxng_venv }}/bin/python searx/webapp.py
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: "0644"
