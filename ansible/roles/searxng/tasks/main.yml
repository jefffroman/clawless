---
# Role: searxng
# Installs SearXNG from git source in its own Python venv, runs as a systemd
# service on loopback. Provides free web search for OpenClaw agents via the JSON API.

- name: Create searxng system user
  ansible.builtin.user:
    name: "{{ searxng_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /opt/searxng
    create_home: false

- name: Ensure SearXNG directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ searxng_user }}"
    group: "{{ searxng_user }}"
    mode: "0755"
  loop:
    - /opt/searxng
    - "{{ searxng_config_dir }}"

- name: Clone SearXNG source
  ansible.builtin.git:
    repo: https://github.com/searxng/searxng.git
    dest: "{{ searxng_src }}"
    depth: 1
    version: master
    force: false
  register: searxng_clone

- name: Create SearXNG Python venv
  ansible.builtin.command:
    cmd: python3 -m venv {{ searxng_venv }}
    creates: "{{ searxng_venv }}/bin/activate"

- name: Install SearXNG requirements into venv
  ansible.builtin.pip:
    requirements: "{{ searxng_src }}/requirements.txt"
    virtualenv: "{{ searxng_venv }}"

- name: Fix ownership
  ansible.builtin.file:
    path: /opt/searxng
    state: directory
    owner: "{{ searxng_user }}"
    group: "{{ searxng_user }}"
    recurse: true

- name: Generate SearXNG secret key (once)
  ansible.builtin.shell:
    cmd: openssl rand -hex 32
  register: searxng_secret_raw
  changed_when: false
  when: searxng_secret_key is not defined

- name: Set SearXNG secret key fact
  ansible.builtin.set_fact:
    searxng_secret_key: "{{ searxng_secret_raw.stdout }}"
  when: searxng_secret_key is not defined

- name: Deploy SearXNG settings
  ansible.builtin.template:
    src: settings.yml.j2
    dest: "{{ searxng_config_dir }}/settings.yml"
    owner: "{{ searxng_user }}"
    group: "{{ searxng_user }}"
    mode: "0644"
  notify: Restart searxng

- name: Deploy SearXNG systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/searxng.service
    content: |
      [Unit]
      Description=SearXNG metasearch engine
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=exec
      User={{ searxng_user }}
      Group={{ searxng_user }}
      WorkingDirectory={{ searxng_src }}
      Environment=SEARXNG_SETTINGS_PATH={{ searxng_config_dir }}/settings.yml
      Environment=PYTHONPATH={{ searxng_src }}
      ExecStart={{ searxng_venv }}/bin/python searx/webapp.py
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: "0644"
  notify: Restart searxng

- name: Enable and start SearXNG service
  ansible.builtin.systemd:
    name: searxng
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for SearXNG to be reachable
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ searxng_port }}/search?q=test&format=json"
    return_content: false
    status_code: 200
  register: searxng_health
  until: searxng_health.status == 200
  retries: 10
  delay: 2
