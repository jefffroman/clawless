---
# Client tasks: per-instance SearXNG config applied at boot time.
# Called via: tasks_from: client

- name: Generate SearXNG secret key (once)
  ansible.builtin.shell:
    cmd: openssl rand -hex 32
  register: searxng_secret_raw
  changed_when: false
  when: searxng_secret_key is not defined

- name: Set SearXNG secret key fact
  ansible.builtin.set_fact:
    searxng_secret_key: "{{ searxng_secret_raw.stdout }}"
  when: searxng_secret_key is not defined

- name: Deploy SearXNG settings
  ansible.builtin.template:
    src: settings.yml.j2
    dest: "{{ searxng_config_dir }}/settings.yml"
    owner: "{{ searxng_user }}"
    group: "{{ searxng_user }}"
    mode: "0644"
  notify: Restart searxng

- name: Enable and start SearXNG service
  ansible.builtin.systemd:
    name: searxng
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for SearXNG to be reachable
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ searxng_port }}/search?q=test&format=json"
    return_content: false
    status_code: 200
  register: searxng_health
  until: searxng_health.status == 200
  retries: 10
  delay: 2
