---

- name: Resolve openclaw user home and UID
  ansible.builtin.command:
    cmd: "getent passwd {{ openclaw_user }}"
  register: openclaw_getent
  changed_when: false

- name: Resolve agent user home
  ansible.builtin.command:
    cmd: "getent passwd {{ agent_user }}"
  register: agent_getent
  changed_when: false

- name: Set derived path facts
  ansible.builtin.set_fact:
    openclaw_uid: "{{ openclaw_getent.stdout.split(':')[2] }}"
    openclaw_home: "{{ openclaw_getent.stdout.split(':')[5] }}"
    openclaw_state_dir: "{{ openclaw_getent.stdout.split(':')[5] }}/.openclaw"
    agent_home: "{{ agent_getent.stdout.split(':')[5] }}"
    openclaw_workspace_dir: "{{ agent_getent.stdout.split(':')[5] }}"

# S3 workspace restore removed — wake restores from Lightsail snapshot
# (exact state at pause time). S3 backups are hourly and potentially stale.
# For disaster recovery (instance deleted, no snapshot), use restore-agent.sh.

- name: Pre-create workspace .openclaw dir for gateway runtime state
  ansible.builtin.file:
    path: "{{ agent_home }}/.openclaw"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ agent_user }}"
    mode: "0750"

- name: Ensure OpenClaw config directory exists
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0750"

- name: Ensure OpenClaw env file exists with correct permissions
  ansible.builtin.file:
    path: "{{ openclaw_env_file }}"
    state: touch
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"
    modification_time: preserve
    access_time: preserve

# ── AWS credential setup ──────────────────────────────────────────────────────
# Lightsail has no instance profile support; IMDS provides the wrong IAM role
# (Lightsail's own account). Instead, the AWS SDK calls clawless-creds-helper
# via credential_process. The helper uses sudo to access root's SSM credentials,
# assumes the per-client role for a 12-hour session, and returns credential_process
# JSON including Expiration so the SDK auto-refreshes without a service restart.
# AWS_EC2_METADATA_DISABLED prevents fallback to IMDS.

- name: Ensure AWS credentials directory exists
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.aws"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0700"

- name: Deploy credential_process helper script
  ansible.builtin.template:
    src: clawless-creds-helper.j2
    dest: /usr/local/sbin/clawless-creds-helper
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0750"

- name: Deploy AWS config with credential_process
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/.aws/config"
    content: |
      [default]
      credential_process = /usr/local/sbin/clawless-creds-helper
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"

# Agent user needs AWS credentials for backup (s3 sync) and CloudWatch metrics.
- name: Ensure agent AWS credentials directory exists
  ansible.builtin.file:
    path: "{{ agent_home }}/.aws"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: "0700"

- name: Deploy agent AWS config with credential_process
  ansible.builtin.copy:
    dest: "{{ agent_home }}/.aws/config"
    content: |
      [default]
      credential_process = /usr/local/sbin/clawless-creds-helper
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: "0600"

# Agent user needs sudo for clawless-creds-helper (accesses root's SSM creds).
# Unlike ubuntu, agent doesn't have NOPASSWD:ALL — grant only what's needed.
- name: Grant agent user sudo access for credential helper
  ansible.builtin.copy:
    dest: /etc/sudoers.d/clawless-agent
    content: |
      {{ agent_user }} ALL=(root) NOPASSWD: /usr/bin/aws sts assume-role *
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

# Use lineinfile (not template) so the OPENCLAW_GATEWAY_TOKEN line written below
# is never clobbered when the region changes on re-runs.
- name: Set AWS_DEFAULT_REGION in env file
  ansible.builtin.lineinfile:
    path: "{{ openclaw_env_file }}"
    regexp: "^AWS_DEFAULT_REGION="
    line: "AWS_DEFAULT_REGION={{ openclaw_bedrock_region }}"
  notify: Restart openclaw

- name: Set AWS_PROFILE in env file (triggers SDK config file loading)
  ansible.builtin.lineinfile:
    path: "{{ openclaw_env_file }}"
    regexp: "^AWS_PROFILE="
    line: "AWS_PROFILE=default"
  notify: Restart openclaw

- name: Disable IMDS fallback in env file
  ansible.builtin.lineinfile:
    path: "{{ openclaw_env_file }}"
    regexp: "^AWS_EC2_METADATA_DISABLED="
    line: "AWS_EC2_METADATA_DISABLED=true"
  notify: Restart openclaw

- name: Enable AWS SDK config file loading (required for credential_process)
  ansible.builtin.lineinfile:
    path: "{{ openclaw_env_file }}"
    regexp: "^AWS_SDK_LOAD_CONFIG="
    line: "AWS_SDK_LOAD_CONFIG=1"
  notify: Restart openclaw

# The gateway token is generated on the remote host and written directly to
# the env file. It is never read back to the control node (no_log + write-only).
# Idempotent: the lineinfile check preserves an existing token across re-runs.
- name: Check if gateway token is already set
  ansible.builtin.shell:
    cmd: grep -q "^OPENCLAW_GATEWAY_TOKEN=" {{ openclaw_env_file }}
  register: token_check
  failed_when: false
  changed_when: false
  no_log: true

- name: Generate and write gateway token (first run only)
  ansible.builtin.lineinfile:
    path: "{{ openclaw_env_file }}"
    regexp: "^OPENCLAW_GATEWAY_TOKEN="
    line: "OPENCLAW_GATEWAY_TOKEN={{ lookup('pipe', 'openssl rand -hex 32') }}"
  no_log: true
  when: token_check.rc != 0
  notify: Restart openclaw

- name: Ensure service drop-in directory exists
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.config/systemd/user/{{ openclaw_service_name }}.service.d"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

# Drop-in injects the EnvironmentFile without touching the service unit that
# openclaw onboard created. This survives openclaw upgrades that regenerate
# the service file.
- name: Configure OpenClaw systemd unit to load environment file
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/.config/systemd/user/{{ openclaw_service_name }}.service.d/clawless.conf"
    content: |
      [Service]
      EnvironmentFile={{ openclaw_env_file }}
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0644"
  notify:
    - Reload user systemd daemon
    - Restart openclaw

- name: Ensure OpenClaw service is enabled and running
  ansible.builtin.systemd:
    name: "{{ openclaw_service_name }}"
    enabled: true
    state: started
    scope: user
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ openclaw_uid }}"

- name: Verify OpenClaw service is active
  ansible.builtin.command:
    cmd: systemctl --user is-active {{ openclaw_service_name }}
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ openclaw_uid }}"
  register: service_status
  until: service_status.rc == 0
  retries: 60
  delay: 5
  changed_when: false
