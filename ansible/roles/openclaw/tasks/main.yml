---

# Restore workspace from S3 before starting OpenClaw. On a fresh instance
# (first provision) the bucket will be empty and this is a no-op. On resume
# after a pause the bucket contains the previous workspace, so this restores
# full agent history and memory before the service starts.
- name: Check for existing workspace data in S3
  ansible.builtin.command:
    cmd: aws s3 ls s3://{{ openclaw_backup_bucket }}/workspace/
  register: s3_workspace_check
  changed_when: false
  failed_when: false

- name: Restore workspace from S3 (resume path)
  ansible.builtin.command:
    cmd: >
      aws s3 sync
      s3://{{ openclaw_backup_bucket }}/workspace/
      {{ openclaw_workspace_dir }}/
  when: s3_workspace_check.rc == 0 and s3_workspace_check.stdout != ""

- name: Ensure OpenClaw config directory exists
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0750"

- name: Deploy OpenClaw environment file (AWS region)
  ansible.builtin.template:
    src: openclaw.env.j2
    dest: "{{ openclaw_env_file }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"
  notify: Restart openclaw

# The gateway token is generated on the remote host and written directly to
# the env file. It is never read back to the control node (no_log + write-only).
# Idempotent: the lineinfile check preserves an existing token across re-runs.
- name: Check if gateway token is already set
  ansible.builtin.shell:
    cmd: grep -q "^OPENCLAW_GATEWAY_TOKEN=" {{ openclaw_env_file }}
  register: token_check
  failed_when: false
  changed_when: false
  no_log: true

- name: Generate and write gateway token (first run only)
  ansible.builtin.shell:
    cmd: |
      printf 'OPENCLAW_GATEWAY_TOKEN=%s\n' "$(openssl rand -hex 32)" \
        >> {{ openclaw_env_file }}
  when: token_check.rc != 0
  no_log: true
  notify: Restart openclaw

- name: Deploy OpenClaw YAML config (bind address, model, region)
  ansible.builtin.template:
    src: openclaw.yml.j2
    dest: "{{ openclaw_config_file }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0640"
  notify: Restart openclaw

- name: Configure OpenClaw systemd unit to load environment file
  ansible.builtin.lineinfile:
    path: "/etc/systemd/system/{{ openclaw_service_name }}.service"
    regexp: "^EnvironmentFile="
    line: "EnvironmentFile={{ openclaw_env_file }}"
    insertafter: "^\\[Service\\]"
    backup: true
  notify:
    - Reload systemd daemon
    - Restart openclaw

- name: Ensure OpenClaw service is enabled and running
  ansible.builtin.systemd:
    name: "{{ openclaw_service_name }}"
    enabled: true
    state: started

- name: Verify gateway is listening on loopback
  ansible.builtin.wait_for:
    host: "{{ openclaw_gateway_host }}"
    port: "{{ openclaw_gateway_port }}"
    timeout: 30
    state: started
