---
# Base tasks: directory structure and static config baked into golden image.
# Called via: tasks_from: base

- name: Resolve openclaw user home and UID
  ansible.builtin.command:
    cmd: "getent passwd {{ openclaw_user }}"
  register: openclaw_getent
  changed_when: false

- name: Set derived path facts
  ansible.builtin.set_fact:
    openclaw_uid: "{{ openclaw_getent.stdout.split(':')[2] }}"
    openclaw_home: "{{ openclaw_getent.stdout.split(':')[5] }}"
    openclaw_state_dir: "{{ openclaw_getent.stdout.split(':')[5] }}/.openclaw"
    openclaw_workspace_dir: "{{ openclaw_getent.stdout.split(':')[5] }}/.openclaw/workspace"

- name: Ensure OpenClaw config directory exists
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0750"

- name: Ensure OpenClaw env file exists with correct permissions
  ansible.builtin.file:
    path: "{{ openclaw_env_file }}"
    state: touch
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Ensure AWS credentials directory exists
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.aws"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0700"

- name: Deploy AWS config with credential_process
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/.aws/config"
    content: |
      [default]
      credential_process = /usr/local/sbin/clawless-creds-helper
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"

# Static env vars that never change per client.
- name: Set AWS_PROFILE in env file (triggers SDK config file loading)
  ansible.builtin.lineinfile:
    path: "{{ openclaw_env_file }}"
    regexp: "^AWS_PROFILE="
    line: "AWS_PROFILE=default"

- name: Disable IMDS fallback in env file
  ansible.builtin.lineinfile:
    path: "{{ openclaw_env_file }}"
    regexp: "^AWS_EC2_METADATA_DISABLED="
    line: "AWS_EC2_METADATA_DISABLED=true"

- name: Enable AWS SDK config file loading (required for credential_process)
  ansible.builtin.lineinfile:
    path: "{{ openclaw_env_file }}"
    regexp: "^AWS_SDK_LOAD_CONFIG="
    line: "AWS_SDK_LOAD_CONFIG=1"

- name: Ensure service drop-in directory exists
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.config/systemd/user/{{ openclaw_service_name }}.service.d"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

- name: Configure OpenClaw systemd unit to load environment file
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/.config/systemd/user/{{ openclaw_service_name }}.service.d/clawless.conf"
    content: |
      [Service]
      EnvironmentFile={{ openclaw_env_file }}
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0644"
