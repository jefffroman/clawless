---
openclaw_default_model:  "amazon.nova-lite-v1:0"
openclaw_bedrock_region: "us-east-1"
openclaw_config_dir:     /etc/openclaw
openclaw_env_file:       /etc/openclaw/openclaw.env
openclaw_service_name:   openclaw-gateway
openclaw_user:           ubuntu
# openclaw_home, openclaw_state_dir, openclaw_uid, and openclaw_workspace_dir
# are resolved dynamically via getent in tasks/main.yml.
# Do not hardcode paths here — they derive from the system passwd database.
