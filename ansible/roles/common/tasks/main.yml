---
# Wait for any boot-time unattended-upgrades to finish before touching apt.
# Fresh Ubuntu instances run unattended-upgr immediately; competing for the
# dpkg lock causes hard failures.
- name: Wait for unattended-upgrades to finish
  ansible.builtin.shell:
    cmd: |
      while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
        sleep 5
      done
  changed_when: false

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade userspace packages (skip kernel — managed by Lightsail base image)
  ansible.builtin.apt:
    upgrade: safe
    autoremove: true
    autoclean: true

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - unattended-upgrades
      - jq
      - python3-venv
      - python3-pip
      - haveged
    state: present

- name: Install shared Python packages (global, available to --system-site-packages venvs)
  ansible.builtin.pip:
    name:
      - aiohttp
    state: present
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: "1"

- name: Add NodeSource repository for Node.js 22
  ansible.builtin.shell:
    cmd: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js 22
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install AWS CLI v2 via snap
  community.general.snap:
    name: aws-cli
    classic: true
    state: present

# SSM Agent: installed here (after apt upgrade) so it's guaranteed on the
# golden snapshot. Required for SSM hybrid activation, credential delivery,
# and Session Manager access. Auto-updates via snap.
- name: Install SSM Agent via snap
  community.general.snap:
    name: amazon-ssm-agent
    classic: true
    state: present

- name: Ensure SSM Agent is enabled and running
  ansible.builtin.systemd:
    name: snap.amazon-ssm-agent.amazon-ssm-agent
    enabled: true
    state: started

- name: Configure unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"

- name: Install Docker (CE)
  block:
    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        creates: /usr/share/keyrings/docker-archive-keyring.gpg

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

- name: Add openclaw user (ubuntu) to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

- name: Deploy bash aliases for ubuntu user
  ansible.builtin.copy:
    dest: /home/ubuntu/.bash_aliases
    content: |
      alias checkclaw="systemctl --user status openclaw-gateway --no-pager;echo;journalctl --user-unit openclaw-gateway -n 50 --no-pager"
      alias checkboot="ls -la /home/ubuntu/.openclaw/.provisioned;echo;cat /var/log/cloud-init-output.log"
      alias reprovision="sudo git clone --depth=1 --branch latest https://github.com/jefffroman/clawless.git /tmp/clawless-repo && sudo cp -r /tmp/clawless-repo/ansible/* /opt/clawless/ansible/ && sudo rm -rf /tmp/clawless-repo && cd /opt/clawless/ansible && sudo ansible-playbook playbooks/provision-client.yml -i localhost, -c local -e @/tmp/clawless-client-vars.json"
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Deploy bash aliases for root user
  ansible.builtin.copy:
    dest: /root/.bash_aliases
    content: |
      alias checkclaw="sudo -u ubuntu XDG_RUNTIME_DIR=/run/user/\$(id -u ubuntu) systemctl --user status openclaw-gateway --no-pager;echo;sudo -u ubuntu XDG_RUNTIME_DIR=/run/user/\$(id -u ubuntu) journalctl --user-unit openclaw-gateway -n 50 --no-pager"
      alias checkboot="ls -la /home/ubuntu/.openclaw/.provisioned;echo;cat /var/log/cloud-init-output.log"
      alias reprovision="git clone --depth=1 --branch latest https://github.com/jefffroman/clawless.git /tmp/clawless-repo && cp -r /tmp/clawless-repo/ansible/* /opt/clawless/ansible/ && rm -rf /tmp/clawless-repo && cd /opt/clawless/ansible && ansible-playbook playbooks/provision-client.yml -i localhost, -c local -e @/tmp/clawless-client-vars.json"
    owner: root
    group: root
    mode: "0644"

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC

