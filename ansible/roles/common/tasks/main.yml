---
# Wait for any boot-time unattended-upgrades to finish before touching apt.
# Fresh Ubuntu instances run unattended-upgr immediately; competing for the
# dpkg lock causes hard failures.
- name: Wait for unattended-upgrades to finish
  ansible.builtin.shell:
    cmd: |
      while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
        sleep 5
      done
  changed_when: false

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Full dist-upgrade (addresses outdated kernel in Lightsail blueprint)
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  register: apt_upgrade_result

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - unattended-upgrades
      - jq
      - python3-venv
    state: present

- name: Add NodeSource repository for Node.js 22
  ansible.builtin.shell:
    cmd: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js 22
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install AWS CLI v2 via snap
  community.general.snap:
    name: aws-cli
    classic: true
    state: present

- name: Configure unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"

- name: Install Docker (CE)
  block:
    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        creates: /usr/share/keyrings/docker-archive-keyring.gpg

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

- name: Create agent system user (sandbox tool execution)
  ansible.builtin.user:
    name: agent
    system: true
    create_home: true
    home: /home/agent
    shell: /bin/bash

- name: Add openclaw user (ubuntu) to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC

- name: Reboot if kernel was upgraded
  ansible.builtin.reboot:
    reboot_timeout: 300
    msg: "Rebooting after kernel upgrade"
  when: apt_upgrade_result.changed
