---
# Role: backup
# Installs a systemd timer that syncs the OpenClaw workspace to S3 hourly.
# AWS credentials come from SSM (no keys needed here).

- name: Deploy workspace backup script
  ansible.builtin.copy:
    dest: /usr/local/bin/clawless-backup
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/bash
      set -euo pipefail
      if aws s3 sync \
        "{{ openclaw_workspace_dir }}/" \
        "s3://{{ openclaw_backup_bucket }}/agents/{{ agent_slug }}/workspace/" \
        --delete \
        --no-progress; then
        aws cloudwatch put-metric-data \
          --region "{{ openclaw_bedrock_region }}" \
          --namespace "Clawless/Backup" \
          --metric-name "BackupFailure" \
          --dimensions "AgentSlug={{ agent_slug | replace('/', '-') }}" \
          --value 0 --unit Count
      else
        aws cloudwatch put-metric-data \
          --region "{{ openclaw_bedrock_region }}" \
          --namespace "Clawless/Backup" \
          --metric-name "BackupFailure" \
          --dimensions "AgentSlug={{ agent_slug | replace('/', '-') }}" \
          --value 1 --unit Count
        exit 1
      fi

- name: Deploy backup systemd service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/clawless-backup.service
    content: |
      [Unit]
      Description=Clawless OpenClaw workspace backup to S3

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/clawless-backup
      User={{ openclaw_user }}
      Environment=AWS_EC2_METADATA_DISABLED=true AWS_SDK_LOAD_CONFIG=1
  notify: Reload systemd daemon

- name: Deploy backup systemd timer unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/clawless-backup.timer
    content: |
      [Unit]
      Description=Run Clawless workspace backup {{ backup_timer_schedule }}

      [Timer]
      OnCalendar={{ backup_timer_schedule }}
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd daemon

- name: Enable and start backup timer
  ansible.builtin.systemd:
    name: clawless-backup.timer
    enabled: true
    state: started
    daemon_reload: true
