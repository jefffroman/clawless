---
# Base tasks: systemd units baked into golden image.
# Called via: tasks_from: base

- name: Deploy backup systemd service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/clawless-backup.service
    content: |
      [Unit]
      Description=Clawless OpenClaw workspace backup to S3

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/clawless-backup
      User={{ openclaw_user }}
      Environment=AWS_EC2_METADATA_DISABLED=true AWS_SDK_LOAD_CONFIG=1
  notify: Reload systemd daemon

- name: Deploy backup systemd timer unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/clawless-backup.timer
    content: |
      [Unit]
      Description=Run Clawless workspace backup {{ backup_timer_schedule }}

      [Timer]
      OnCalendar={{ backup_timer_schedule }}
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd daemon
