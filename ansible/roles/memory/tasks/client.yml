---
# Client tasks: seed workspace files and configure OpenClaw for this client.
# Called via: tasks_from: client
# Requires openclaw path facts (set by openclaw/tasks/client.yml earlier in the play).

# Seed MEMORY.md and AGENTS.md only on first provision.
# On resume, these are restored from the Lightsail snapshot.
- name: Seed MEMORY.md (first provision only)
  ansible.builtin.template:
    src: MEMORY.md.j2
    dest: "{{ openclaw_workspace_dir }}/MEMORY.md"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0640"
    force: false

- name: Seed AGENTS.md (first provision only)
  ansible.builtin.template:
    src: AGENTS.md.j2
    dest: "{{ openclaw_workspace_dir }}/AGENTS.md"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0640"
    force: false

- name: Seed identity and persona files (first provision only)
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ openclaw_workspace_dir }}/{{ item.dest }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0640"
    force: false
  loop:
    - { src: SOUL.md.j2,      dest: SOUL.md }
    - { src: IDENTITY.md.j2,  dest: IDENTITY.md }
    - { src: TOOLS.md.j2,     dest: TOOLS.md }
    - { src: USER.md.j2,      dest: USER.md }
    - { src: HEARTBEAT.md.j2, dest: HEARTBEAT.md }
    - { src: BOOTSTRAP.md.j2, dest: BOOTSTRAP.md }

- name: Patch OpenClaw config for memory search and model
  ansible.builtin.command:
    cmd: >
      python3
      {{ openclaw_workspace_dir }}/vector_memory/configure_openclaw.py
  environment:
    OPENCLAW_CONFIG_PATH: "{{ openclaw_json_config }}"
    OPENCLAW_MODEL: "{{ bedrock_model | default('bedrock/us.amazon.nova-lite-v1:0') }}"
  notify: Restart openclaw

- name: Patch OpenClaw config for channel integration
  ansible.builtin.command:
    cmd: >
      python3
      {{ openclaw_workspace_dir }}/vector_memory/configure_openclaw.py
  environment:
    OPENCLAW_CONFIG_PATH: "{{ openclaw_json_config }}"
    OPENCLAW_CHANNEL: "{{ agent_channel | lower }}"
    OPENCLAW_CHANNEL_CONFIG: "{{ channel_config | to_json }}"
  when: channel_config is defined and channel_config is not none
  no_log: true
  notify: Restart openclaw

- name: Run initial memory index
  ansible.builtin.command:
    cmd: >
      {{ openclaw_workspace_dir }}/vector_memory/venv/bin/python
      {{ openclaw_workspace_dir }}/vector_memory/indexer.py
  become_user: "{{ openclaw_user }}"
  changed_when: true  # indexer always produces output

- name: Enable and start reindex timer
  ansible.builtin.systemd:
    name: clawless-reindex.timer
    enabled: true
    state: started
    daemon_reload: true
