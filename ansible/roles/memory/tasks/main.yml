---
# Role: memory
# Sets up the 3-layer agent memory system (L1: Markdown, L2: ChromaDB+BM25+RRF,
# L3: NetworkX) in the agent's workspace. Seeds MEMORY.md and AGENTS.md on first
# provision; idempotent on re-runs. Auto-reindex runs every 5 minutes via systemd timer.

- name: Create workspace subdirectories
  ansible.builtin.file:
    path: "{{ openclaw_workspace_dir }}/{{ item }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0750"
  loop:
    - memory
    - vector_memory

- name: Deploy workspace .gitignore
  ansible.builtin.template:
    src: workspace.gitignore.j2
    dest: "{{ openclaw_workspace_dir }}/.gitignore"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0640"
    force: false  # Don't overwrite if already customised

- name: Create Python venv
  ansible.builtin.command:
    cmd: python3 -m venv "{{ openclaw_workspace_dir }}/vector_memory/venv"
    creates: "{{ openclaw_workspace_dir }}/vector_memory/venv/bin/activate"
  become_user: "{{ openclaw_user }}"

- name: Install memory Python packages
  ansible.builtin.pip:
    name:
      - chromadb
      - sentence-transformers
      - networkx
      - rank-bm25
    virtualenv: "{{ openclaw_workspace_dir }}/vector_memory/venv"
    state: present
  become_user: "{{ openclaw_user }}"

- name: Deploy memory scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ openclaw_workspace_dir }}/vector_memory/{{ item }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0750"
  loop:
    - indexer.py
    - search.py
    - auto_retrieve.py
    - configure_openclaw.py

# Seed MEMORY.md and AGENTS.md only on first provision.
# On resume, these are restored from S3 by the openclaw role.
- name: Seed MEMORY.md (first provision only)
  ansible.builtin.template:
    src: MEMORY.md.j2
    dest: "{{ openclaw_workspace_dir }}/MEMORY.md"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0640"
    force: false

- name: Seed AGENTS.md (first provision only)
  ansible.builtin.template:
    src: AGENTS.md.j2
    dest: "{{ openclaw_workspace_dir }}/AGENTS.md"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0640"
    force: false

- name: Patch OpenClaw config for memory search
  ansible.builtin.command:
    cmd: >
      {{ openclaw_workspace_dir }}/vector_memory/venv/bin/python
      vector_memory/configure_openclaw.py
  args:
    chdir: "{{ openclaw_workspace_dir }}"
  environment:
    OPENCLAW_CONFIG_PATH: "{{ openclaw_json_config }}"
  become_user: "{{ openclaw_user }}"
  notify: Restart openclaw

- name: Run initial memory index
  ansible.builtin.command:
    cmd: >
      {{ openclaw_workspace_dir }}/vector_memory/venv/bin/python
      vector_memory/indexer.py
  args:
    chdir: "{{ openclaw_workspace_dir }}"
  become_user: "{{ openclaw_user }}"
  changed_when: true  # indexer always produces output

- name: Deploy auto-reindex script
  ansible.builtin.copy:
    dest: /usr/local/bin/clawless-reindex
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      WORKSPACE="{{ openclaw_workspace_dir }}"
      VENV="${WORKSPACE}/vector_memory/venv"
      cd "${WORKSPACE}"
      if "${VENV}/bin/python" vector_memory/auto_retrieve.py --status 2>/dev/null \
          | grep -q '"OUT_OF_SYNC"'; then
        exec "${VENV}/bin/python" vector_memory/indexer.py
      fi

- name: Deploy reindex systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/clawless-reindex.service
    content: |
      [Unit]
      Description=Clawless memory re-index (runs if MEMORY.md out of sync)

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/clawless-reindex
      User={{ openclaw_user }}
  notify: Reload systemd daemon

- name: Deploy reindex systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/clawless-reindex.timer
    content: |
      [Unit]
      Description=Clawless memory re-index check every 5 minutes

      [Timer]
      OnCalendar={{ memory_reindex_schedule }}
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd daemon

- name: Enable and start reindex timer
  ansible.builtin.systemd:
    name: clawless-reindex.timer
    enabled: true
    state: started
    daemon_reload: true
