---
# Agent identity — overridden by storefront at signup time
agent_name:    "{{ agent_slug }}"
agent_style:   "assistant"
agent_channel: "Telegram"

# Path to openclaw.json (agent/memory config, distinct from openclaw.yml)
openclaw_json_config: "{{ openclaw_state_dir }}/openclaw.json"

# Auto-reindex: how often to check if MEMORY.md is out of sync
memory_reindex_schedule: "*:0/5"  # every 5 minutes
