---
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart openclaw
  ansible.builtin.systemd:
    name: "{{ openclaw_service_name }}"
    state: restarted
    scope: user
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/1000"
