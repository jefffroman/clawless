[defaults]
inventory           = inventory/hosts.yml
remote_user         = ubuntu
private_key_file    = ~/.ssh/clawless_ansible
host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
timeout             = 30

[ssh_connection]
pipelining = True
ssh_args   = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60
