---
# Thin client-specific provisioning: runs after instance creation from golden snapshot.
# System software and memory packages are already baked in; this only writes
# client config, injects channel credentials, and seeds the workspace.
#
# Invocation modes:
#   Self-provisioning (user-data at boot): ansible-playbook ... -i localhost, -c local
#   Manual re-run (from dev machine):      ansible-playbook ... -i "<ip>,"
#
# The SSH-specific pre_tasks are conditioned on ansible_connection so both modes work.
- name: Configure Clawless OpenClaw node for a specific client
  hosts: all
  become: true
  gather_facts: false
  serial: 5

  pre_tasks:
    - name: Wait for instance to be reachable via SSH
      when: ansible_connection != 'local'
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300

    - name: Wait for cloud-init to finish (ensures user_data SSM registration is complete)
      when: ansible_connection != 'local'
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      # cloud-init exits 1 on snapshot-restored instances because it re-runs modules
      # that already ran (SSH key generation, network config, etc.) and can't redo them
      # cleanly. The exit code reflects those cosmetic module failures, not whether our
      # user_data script ran. SSM registration is verified by the next task.
      failed_when: false

    - name: Wait for instance to register with SSM
      when: ansible_connection != 'local'
      delegate_to: localhost
      become: false
      ansible.builtin.shell:
        cmd: >
          aws ssm describe-instance-information
          --filters 'Key=IamRole,Values=clawless-{{ agent_slug | replace("/", "-") }}-ssm'
          --region '{{ openclaw_bedrock_region }}'
          --query 'InstanceInformationList[0].InstanceId'
          --output text
      register: ssm_registration
      until: ssm_registration.stdout | length > 0 and ssm_registration.stdout != "None"
      retries: 20
      delay: 15
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

  roles:
    - role: searxng
    - role: openclaw
    - role: backup
    - role: memory

  post_tasks:
    - name: Mark instance as provisioned
      ansible.builtin.file:
        path: "{{ openclaw_state_dir }}/.provisioned"
        state: touch
        modification_time: preserve
        access_time: preserve
        owner: root
        group: root
        mode: "0644"
