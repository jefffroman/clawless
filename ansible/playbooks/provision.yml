---
- name: Post-provision setup for Clawless OpenClaw nodes
  hosts: clawless_nodes
  become: true
  gather_facts: false
  serial: 5

  pre_tasks:
    - name: Wait for instance to be reachable via SSH
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300

    - name: Wait for instance to register with SSM
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: >
          aws ssm describe-instance-information
          --filters "Key=IpAddress,Values={{ ansible_host }}"
          --region "{{ openclaw_bedrock_region }}"
          --query "InstanceInformationList[0].InstanceId"
          --output text
      register: ssm_registration
      until: ssm_registration.stdout | length > 0 and ssm_registration.stdout != "None"
      retries: 20
      delay: 15
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

  roles:
    - role: common
    - role: openclaw
    - role: backup
