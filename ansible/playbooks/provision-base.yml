---
# Base image bake: runs once on the golden template instance.
# Applies system updates, installs OpenClaw, and pre-installs slow Python
# packages so that provision-client.yml (which runs per new client) is fast.
# No client-specific configuration — this produces a generic, reusable image.
#
# OpenClaw is installed here via npm (not the Lightsail blueprint).
# openclaw onboard --install-daemon creates the user service + bare openclaw.json.
# provision-client.yml then patches the config and injects credentials.
- name: Bake base image for Clawless OpenClaw nodes
  hosts: all
  become: true
  gather_facts: false

  vars:
    openclaw_user: ubuntu
    agent_user: agent

  pre_tasks:
    - name: Wait for instance to be reachable via SSH
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300

    - name: Gather facts
      ansible.builtin.setup:

    - name: Resolve openclaw user home and UID
      ansible.builtin.command:
        cmd: "getent passwd {{ openclaw_user }}"
      register: openclaw_getent
      changed_when: false

    - name: Set openclaw path facts
      ansible.builtin.set_fact:
        openclaw_uid: "{{ openclaw_getent.stdout.split(':')[2] }}"
        openclaw_home: "{{ openclaw_getent.stdout.split(':')[5] }}"
        openclaw_state_dir: "{{ openclaw_getent.stdout.split(':')[5] }}/.openclaw"

    # Write marker early so we can identify the snapshot even if later tasks fail.
    - name: Write golden snapshot marker
      ansible.builtin.copy:
        content: "{{ golden_snapshot_name | default('unknown') }}\n"
        dest: /etc/clawless-golden-id
        owner: root
        group: root
        mode: "0644"

  roles:
    - role: common

  post_tasks:
    # Agent user is created by common role — resolve home dir now.
    - name: Resolve agent user home
      ansible.builtin.command:
        cmd: "getent passwd {{ agent_user }}"
      register: agent_getent
      changed_when: false

    - name: Set agent path facts
      ansible.builtin.set_fact:
        agent_home: "{{ agent_getent.stdout.split(':')[5] }}"

    # Install ansible-core so the instance can self-provision via user_data at boot.
    - name: Install ansible-core
      ansible.builtin.apt:
        name: ansible-core
        state: present

    # Bake current ansible playbooks into the snapshot so instances can self-provision
    # at boot without needing AWS credentials to sync from S3.
    - name: Ensure /opt/clawless/ansible directory exists
      ansible.builtin.file:
        path: /opt/clawless/ansible
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy ansible playbooks to /opt/clawless/ansible
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../"
        dest: /opt/clawless/ansible/
        owner: root
        group: root
        mode: preserve

    # Install OpenClaw globally so any user can run it.
    # npm is provided by the nodejs package installed in the common role.
    - name: Install OpenClaw (latest)
      community.general.npm:
        name: openclaw
        global: true
        state: latest

    # Install InboxAPI MCP server globally (available to agent tool calls).
    - name: Install InboxAPI MCP server globally
      community.general.npm:
        name: "@inboxapi/cli"
        global: true
        state: latest

    # Enable lingering for the openclaw service user so the user-level systemd
    # service starts automatically at boot without requiring a login session.
    - name: Enable lingering for openclaw user
      ansible.builtin.command:
        cmd: loginctl enable-linger {{ openclaw_user }}
      changed_when: false

    # Run openclaw onboard as the service user.
    # --non-interactive + --accept-risk: fully automated, no prompts
    # --install-daemon: creates ~/.config/systemd/user/openclaw-gateway.service
    # --auth-choice skip: we supply AWS Bedrock creds via EnvironmentFile, not openclaw's wizard
    # --gateway-bind loopback: gateway listens on 127.0.0.1 only (never exposed externally)
    # --gateway-token-ref-env: token sourced from OPENCLAW_GATEWAY_TOKEN env at runtime (SecretRef)
    # --skip-*: no channels, skills, or search configured here; provision-client.yml handles them
    # --skip-health: no gateway running yet during bake; health check not applicable
    # Creates: ~/.openclaw/openclaw.json (bare config)
    #          ~/.config/systemd/user/openclaw-gateway.service (user service unit)
    # provision-client.yml then patches openclaw.json and injects credentials via drop-in.
    - name: Run openclaw onboard to install user service and bare config
      ansible.builtin.command:
        cmd: >
          openclaw onboard
          --non-interactive
          --accept-risk
          --install-daemon
          --auth-choice skip
          --gateway-bind loopback
          --gateway-token-ref-env OPENCLAW_GATEWAY_TOKEN
          --skip-channels
          --skip-skills
          --skip-search
          --skip-health
        creates: "{{ openclaw_state_dir }}/openclaw.json"
      become_user: "{{ openclaw_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ openclaw_uid }}"
        OPENCLAW_GATEWAY_TOKEN: placeholder-replaced-at-provision-time

    # Build the sandbox-common Docker image so sandbox containers have python3,
    # nodejs, git, curl, jq. The setup scripts are in the OpenClaw source repo
    # but not the npm package, so we ship our own Dockerfile.
    - name: Check if sandbox-common image exists
      ansible.builtin.command:
        cmd: docker image inspect openclaw-sandbox-common:bookworm-slim
      register: sandbox_image_check
      failed_when: false
      changed_when: false

    - name: Copy sandbox-common Dockerfile to instance
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/Dockerfile.sandbox-common"
        dest: /tmp/Dockerfile.sandbox-common
        mode: "0644"
      when: sandbox_image_check.rc != 0

    - name: Build openclaw-sandbox-common Docker image
      ansible.builtin.command:
        cmd: docker build -t openclaw-sandbox-common:bookworm-slim -f /tmp/Dockerfile.sandbox-common /tmp
      when: sandbox_image_check.rc != 0
      async: 600
      poll: 15

    # Install SearXNG search skill into the agent workspace.
    # The skill provides web search via the local SearXNG instance.
    # Installed as openclaw_user (ubuntu) because the skill installer reads
    # ~/.openclaw/openclaw.json to find the workspace. At bake time the
    # workspace is still the default (/home/ubuntu), so the skill lands in
    # /home/ubuntu/skills/. provision-client.yml copies it to /home/agent/skills/
    # after the workspace is reconfigured.
    - name: Install SearXNG skill from ClawHub
      ansible.builtin.command:
        cmd: openclaw skills install searxng
        creates: /home/{{ openclaw_user }}/.openclaw/workspace/skills/searxng/SKILL.md
      become_user: "{{ openclaw_user }}"
      register: searxng_install
      retries: 3
      delay: 30
      until: searxng_install.rc == 0

    # Pre-create workspace in agent user's home so Python venv install has a home.
    - name: Ensure workspace vector_memory directory exists
      ansible.builtin.file:
        path: "{{ agent_home }}/vector_memory"
        state: directory
        owner: "{{ agent_user }}"
        group: "{{ agent_user }}"
        mode: "0750"

    # Pre-install memory packages so provision-client.yml skips the slow download.
    # The memory role uses creates: on venv creation, so this is idempotent.
    - name: Create Python venv for memory packages
      ansible.builtin.command:
        cmd: "python3 -m venv {{ agent_home }}/vector_memory/venv"
        creates: "{{ agent_home }}/vector_memory/venv/bin/activate"
      become_user: "{{ agent_user }}"

    - name: Pre-install memory Python packages
      ansible.builtin.pip:
        name:
          - chromadb
          - sentence-transformers
          - networkx
          - rank-bm25
        virtualenv: "{{ agent_home }}/vector_memory/venv"
        state: present
      become_user: "{{ agent_user }}"

    # Pre-clone and install SearXNG so provision-client.yml skips the slow git+pip step.
    - name: Clone SearXNG source
      ansible.builtin.git:
        repo: https://github.com/searxng/searxng.git
        dest: /opt/searxng/searxng-src
        depth: 1
        version: master

    - name: Create SearXNG venv
      ansible.builtin.command:
        cmd: python3 -m venv /opt/searxng/venv
        creates: /opt/searxng/venv/bin/activate

    - name: Install SearXNG requirements into venv
      ansible.builtin.pip:
        requirements: /opt/searxng/searxng-src/requirements.txt
        virtualenv: /opt/searxng/venv
