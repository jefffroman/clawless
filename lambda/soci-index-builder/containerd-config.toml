# Minimal containerd config for Lambda.
# - root/state under /tmp (only writable path in Lambda runtime)
# - native snapshotter (copies files; no overlay/loop kernel features needed)
# - CRI plugin disabled (we only use ctr + soci)
version = 2
root    = "/tmp/containerd/root"
state   = "/tmp/containerd/state"

[grpc]
  address = "/tmp/containerd/containerd.sock"

[plugins."io.containerd.grpc.v1.cri"]
  disable = true

[plugins."io.containerd.snapshotter.v1.native"]
  root_path = "/tmp/containerd/snapshots/native"
