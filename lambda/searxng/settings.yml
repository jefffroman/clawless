# SearXNG settings — baked into the Lambda container image.
# Shared across all clawless agents; no per-client config.
use_default_settings: true

general:
  debug: false
  instance_name: "clawless"

server:
  secret_key: "__SECRET_KEY__"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json

# Engine selection tuned for cloud IPs. Google disabled (CAPTCHAs).
engines:
  - name: google
    engine: google
    disabled: true
  - name: bing
    engine: bing
    disabled: false
  - name: brave
    engine: brave
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: reddit
    engine: reddit
    disabled: false
  - name: wikipedia
    engine: wikipedia
    disabled: false
